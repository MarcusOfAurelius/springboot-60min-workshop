# Application Name
spring.application.name=bookstore-chapter-2

# Server Configuration
server.port=8081

# ===================================
# H2 Database Configuration
# ===================================

# JDBC URL for file-based H2 database
# This will create a file at ./data/bookstore.mv.db
spring.datasource.url=jdbc:h2:file:./data/bookstore/ch-2

# Database credentials
spring.datasource.username=sa
spring.datasource.password=

# H2 Database Driver
spring.datasource.driver-class-name=org.h2.Driver

# ===================================
# H2 Console Configuration
# ===================================

# Enable H2 Console (web-based database viewer)
spring.h2.console.enabled=true

# H2 Console path
spring.h2.console.path=/h2-console

# Allow remote access to H2 console (use only in development!)
spring.h2.console.settings.web-allow-others=false

# ===================================
# JPA / Hibernate Configuration
# ===================================

# Show SQL queries in console (great for learning!)
spring.jpa.show-sql=true

# Format SQL queries for readability
spring.jpa.properties.hibernate.format_sql=true

# DDL auto configuration
# - create: drops and creates tables on startup (data loss!)
# - create-drop: creates tables on startup, drops on shutdown
# - update: updates schema without dropping data (use in development)
# - validate: only validates schema, doesn't change it
# - none: no schema management
spring.jpa.hibernate.ddl-auto=create

# Hibernate dialect (auto-detected, but can be specified)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Initialize database with data.sql (after Hibernate creates tables)
spring.jpa.defer-datasource-initialization=true

# ===================================
# Logging Configuration
# ===================================

logging.level.root=INFO
logging.level.com.bookstore.chapter2=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===================================
# JSON Configuration
# ===================================

# Pretty print JSON responses
spring.jackson.serialization.indent-output=true
